<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 13px;
        width: 300px;
        padding: 16px;
        background: #fff;
        color: #0f172a;
      }
      h2 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
      select {
        width: 100%;
        padding: 7px 10px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        font-size: 13px;
        margin-bottom: 10px;
        background: #fff;
        color: #0f172a;
      }
      button {
        width: 100%;
        padding: 8px 12px;
        background: #1e293b;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
      }
      button:hover:not(:disabled) { background: #334155; }
      button:disabled { background: #94a3b8; cursor: not-allowed; }
      .msg {
        margin-top: 10px;
        padding: 8px 10px;
        border-radius: 6px;
        line-height: 1.4;
        font-size: 12px;
      }
      .info  { background: #f1f5f9; color: #475569; }
      .ok    { background: #dcfce7; color: #166534; }
      .err   { background: #fee2e2; color: #991b1b; }
      a { color: #2563eb; }
    </style>
  </head>
  <body>
    <h2>MRC Race Importer</h2>
    <div id="root"></div>
    <script src="popup.js"></script>
  </body>
</html>
